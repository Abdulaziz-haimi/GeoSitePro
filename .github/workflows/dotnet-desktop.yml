name: GeoSitePro Build and Deploy to SmarterASP.NET

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore GeoSitePro.sln

      - name: Publish GeoSitePro
        run: |
          msbuild GeoSitePro.csproj /p:Configuration=Release /p:Platform="Any CPU" /p:DeployOnBuild=true /p:WebPublishMethod=FileSystem /p:DeleteExistingFiles=true /p:PublishUrl="${{ github.workspace }}\publish\"

      - name: Deploy to SmarterASP.NET via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SMARTER_FTP_SERVER }}
          username: ${{ secrets.SMARTER_FTP_USERNAME }}
          password: ${{ secrets.SMARTER_FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: ./
