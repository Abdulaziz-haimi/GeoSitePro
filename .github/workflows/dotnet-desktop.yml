name: GeoSitePro ASP.NET Framework Buildname: GeoSitePro ASP.NET Framework Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore GeoSitePro.sln

      - name: Build solution
        run: msbuild GeoSitePro.sln /p:Configuration=Release /p:Platform="Any CPU" /p:DeployOnBuild=false /p:RestorePackagesConfig=true

